name: Check for new pgvector release

on:
  schedule:
    - cron: "0 6 * * 1"  # Mondays at 06:00 UTC
  workflow_dispatch:

jobs:
  check:
    name: Check pgvector release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest pgvector release
        id: latest
        run: |
          tag=$(curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/pgvector/pgvector/tags?per_page=1" \
            | jq -r '.[0].name')
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "Latest pgvector release: $tag"

      - name: Get last built version
        id: stored
        run: |
          if [ -f .pgvector-version ]; then
            stored=$(cat .pgvector-version | tr -d '[:space:]')
          else
            stored=""
          fi
          echo "tag=$stored" >> $GITHUB_OUTPUT
          echo "Last built version: ${stored:-"(none)"}"

      - name: Trigger build and record version
        if: steps.latest.outputs.tag != steps.stored.outputs.tag && steps.latest.outputs.tag != ''
        run: |
          echo "New release detected (${{ steps.stored.outputs.tag }} → ${{ steps.latest.outputs.tag }}), triggering build"
          gh workflow run build.yml -f pgvector_version="${{ steps.latest.outputs.tag }}"
          echo "${{ steps.latest.outputs.tag }}" > .pgvector-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .pgvector-version
          git commit -m "chore: bump tracked pgvector version to ${{ steps.latest.outputs.tag }}"
          git push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No new release
        if: steps.latest.outputs.tag == steps.stored.outputs.tag
        run: echo "Already at ${{ steps.stored.outputs.tag }}, no build needed"
